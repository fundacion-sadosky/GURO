# ==============================================================================
# Project metadata
# ==============================================================================
site_name: "GURO Tutorial"
site_url: "https://guro.readthedocs.io/"
site_description: "Manual de armado paso a paso para el modelo de robot GURO con el kit Robobloq Qoopers"
repo_url: "https://github.com/fundacion-sadosky/GURO"
repo_name: "fundacion-sadosky/GURO"
edit_uri: "edit/main/docs/"

# ==============================================================================
# Theme configuration
# ==============================================================================
theme:
  name: material
  locale: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit       # "Edit this page" link for contributors
    - content.action.view
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  icon:
    repo: fontawesome/brands/github

# ==============================================================================
# Navigation
# ==============================================================================
nav:
  - Inicio: index.md
  - Primeros pasos: getting-started.md
  - Guía de usuario:
    - user-guide/index.md
  - Referencia de API: reference/     # auto-generado por gen_ref_pages.py
  - Contribuciones:
    - contributing/index.md
    - Para redactores: contributing/for-writers.md
    - Para desarrolladores: contributing/for-developers.md

# ==============================================================================
# Plugins
# ==============================================================================
plugins:
  - search

  # --- Obsidian compatibility ---
  - obsidian-bridge:
      invalid_link_attributes:
        - 'class="broken-link"'

  # --- API docs auto-generation ---
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true
  - autorefs

# ==============================================================================
# Markdown extensions — maximizing Obsidian compatibility
# ==============================================================================
markdown_extensions:
  # --- Standard Python-Markdown ---
  - abbr
  - admonition                   # Obsidian callouts → MkDocs admonitions
  - attr_list                    # Needed for obsidian-bridge invalid links
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # --- PyMdown Extensions ---
  - pymdownx.arithmatex:         # LaTeX math (MathJax) — Obsidian compatible
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret               # ^^superscript^^
  - pymdownx.details             # Foldable callouts (Obsidian: > [!note]-)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys                # ++ctrl+alt+del++
  - pymdownx.magiclink
  - pymdownx.mark                # ==highlight== — matches Obsidian syntax
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:        # Mermaid diagrams — Obsidian compatible
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
          #format: !!python/name:pymdownx.superfences.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:           # - [ ] task lists — Obsidian compatible
      custom_checkbox: true
  - pymdownx.tilde               # ~~strikethrough~~ and ~subscript~

# ==============================================================================
# Extra configuration
# ==============================================================================
extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/fundacion-sadosky/GURO"

# ==============================================================================
# Strict mode — catch broken links during build
# ==============================================================================
strict: false    # Set to true once docs stabilize
